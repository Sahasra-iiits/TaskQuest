<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskQuest - 1.0</title>
    <link rel="shortcut icon" href="/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>TaskQuest - 1.0</h1>
    <div class="inputBox">
      <select name="Priority" class="selectBox">
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <input type="text" placeholder="Enter a task"/>
      <button>+</button>
    </div>
    <p class="ins">High +30XP | Medium +20XP | Low +10XP</p>
    <div class="pending">
      <h3>Pending Tasks</h1>
        <div class="pending_tasks"></div>
    </div>
    <div class="completed">
      <h3>Completed Tasks</h1>
        <div class="comp_tasks"></div>
    </div>
    <div class="score_box">
      <p class="score_tag">Score: 0XP</p>
    </div>
    <script src="main.js"></script>
  </body>
</html>
